<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eurovision Points Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        form {
            max-width: 400px;
            margin: auto;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Eurovision Points Predictor</h1>
    <form id="predictForm">
        <label for="energy">Energy:</label>
        <input type="number" step="0.01" id="energy" name="energy" required>

        <label for="tempo">Tempo:</label>
        <input type="number" step="0.01" id="tempo" name="tempo" required>

        <label for="speechiness">Speechiness:</label>
        <input type="number" step="0.01" id="speechiness" name="speechiness" required>

        <label for="acousticness">Acousticness:</label>
        <input type="number" step="0.01" id="acousticness" name="acousticness" required>

        <button type="submit">Predict Points</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById("predictForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const data = {
                energy: parseFloat(document.getElementById("energy").value),
                tempo: parseFloat(document.getElementById("tempo").value),
                speechiness: parseFloat(document.getElementById("speechiness").value),
                acousticness: parseFloat(document.getElementById("acousticness").value)
            };

            const response = await fetch("/predict", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });

            const result = await response.json();
            document.getElementById("result").innerText = "Predicted Points: " + result.predicted_points;
        });
    </script>
</body>
</html>
