<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Historical Voting Patterns</title>
</head>
<body>
    <h1>Eurovision Voting Analysis</h1>
    <form method="POST" action="/voting_result">
        <label for="country">Select a country:</label>
        <select name="country" id="country">
            {% for c in countries %}
                <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
        </select>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}
</body>
</html>
